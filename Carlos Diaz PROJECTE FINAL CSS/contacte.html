<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto CarlosDiaz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="fondo1">
    <header>
        <h1>Contactame</h1>
             <a href="index.html"><input type="button" class="boton" value="Index"></a>
             <a href="contacte.html"><input type="button" class="boton" value="Contactame"></a>
    </header>
    <main>
        <section class="section_main">
                  <form>
                    <fieldset>
                    <legend ><h1>Datos personales</h1></legend>
                        <label for="nombre"><p>Nombre:</p></label>
                        <input type="text" id="nombre" name="nombre" required class="boton"><br>
                        <label for="apellido"><p>Apellido:</p></label>
                        <input type="text" id="apellido" name="apellido" required class="boton"><br>
                        <label for="empresa"><p>Empresa:</p></label>
                        <input type="text" id="empresa" name="empresa" class="boton"><br>
                        <label for="telefono"><p>Telefono:</p></label>
                        <input type="text" id="telefono" name="telefono" required class="boton"><br>
                        <label for="email"><p>Correo electrónico:</p></label>
                        <input type="email" id="email" name="email" required class="boton"><br>
                        <label for="mensaje"><p>Mensaje:</p></label>
                        <textarea id="mensaje" name="mensaje" minlength="10" required class="boton"></textarea><br>
                    </fieldset>
                    <button type="submit" class="boton"><p>Enviar</p></button><button type="reset" class="boton"><p>Limpiar</p></button>
                  </form>
        </section>
    </main>
    <footer>
    <section class="section__footer">        
            <p>Carlos Andrés Diaz Castaño&copy;</p>
        <section class="section__redes">
            <section class="redes">
                <p class="icono"><i class="fa-brands fa-linkedin"></i></p>
                <p class="p">Linkedin</p>
            </section>
            <section class="redes">
                <p class="icono"><i class="fa-brands fa-instagram"></i></p>
                <p class="p">Instagram</p>
            </section>    
            <section class="redes">
                <p class="icono"><i class="fa-brands fa-square-x-twitter"></i></p>
                <p class="p">X</p>
            </section>
            <section class="redes">
                <p class="icono"><i class="fa-brands fa-github"></i></p>
                <p class="p">GitHub</p>
            </section>
        </section>
    </section>
</footer>   
</body>
    </html>
